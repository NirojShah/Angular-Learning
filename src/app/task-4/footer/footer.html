<footer class="footer">
  <div class="footer-content">
    <div class="brand">
      <h3>Orange<span>.com</span></h3>
      <p>Building modern experiences with simple, elegant design.</p>
    </div>

    <div class="footer-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
        >home</a
      >
      @for (item of navItems(); track $index) {
        <a
          routerLink="{{ item.directUrl }}"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          >{{ item.title }}</a
        >
      }
      <button class="career-btn" (click)="handleCareerNavigate()">career page</button>
    </div>
  </div>

  <div class="footer-bottom">
    <p>© 2026 Orange.com. All rights reserved.</p>
  </div>
</footer>
